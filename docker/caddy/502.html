<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>502 - Bad Gateway</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0b0c0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .brand-mark {
      width: 32px;
      height: 32px;
      background: #f6821f;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      font-size: 0.9rem;
    }
    .brand-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #f1f5f9;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #f6821f;
      line-height: 1;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-top: 1rem;
    }
    .error-subtitle {
      font-size: 1rem;
      color: #94a3b8;
      margin-top: 0.5rem;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid #334155;
      color: #cbd5e1;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div>
    <div class="brand">
      <div class="brand-mark">A</div>
      <div class="brand-name">AHOLA</div>
    </div>
    <div class="error-code">502</div>
    <div class="error-title">Bad Gateway</div>
    <div class="error-subtitle">The server is temporarily unable to handle this request.</div>
    <div class="badge">Ahola Node</div>
  </div>
</body>
</html>
