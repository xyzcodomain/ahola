<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>502 - Bad Gateway</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #f6821f;
      line-height: 1;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #333;
      margin-top: 1rem;
    }
    .error-subtitle {
      font-size: 1rem;
      color: #666;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div>
    <div class="error-code">502</div>
    <div class="error-title">Bad Gateway</div>
    <div class="error-subtitle">The server is temporarily unable to handle this request.</div>
  </div>
</body>
</html>
