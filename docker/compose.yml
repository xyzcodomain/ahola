services:

  gateway:
    image: node:22
    working_dir: /app
    volumes:
      - ../gateway:/app
    command:
      sh -c "npm install && node index.js"
    ports:
      - "8080:8080"
    networks:
      - ahola-net
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  panel:
    image: node:22
    working_dir: /app
    volumes:
      - ../panel:/app
      - ../apps:/apps
      - ../nodes:/nodes
      - ../storage:/storage
    command:
      sh -c "npm install && node index.js"
    ports:
      - "3333:3333"
    networks:
      - ahola-net
    deploy:
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  minio:
    image: quay.io/minio/minio
    environment:
      MINIO_ROOT_USER: ahola
      MINIO_ROOT_PASSWORD: change-this-password
      MINIO_NODES: ${MINIO_NODES:-}
    volumes:
      - ../minio/data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ahola-net
    deploy:
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.labels.ahola.storage == true
    command: >
      sh -c "
        if [ -n \"$MINIO_NODES\" ]; then
          echo \"Starting MinIO in distributed mode with: $MINIO_NODES\";
          server $MINIO_NODES --console-address ':9001';
        else
          echo \"Starting MinIO in standalone mode\";
          server /data --console-address ':9001';
        fi
      "

networks:
  ahola-net:
    attachable: true
