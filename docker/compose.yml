services:

  gateway:
    image: node:22
    container_name: ahola-gateway
    working_dir: /app
    volumes:
      - ../gateway:/app
    command:
      sh -c "npm install && node index.js"
    ports:
      - "8080:8080"
    networks:
      - ahola-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  panel:
    image: node:22
    container_name: ahola-panel
    working_dir: /app
    volumes:
      - ../panel:/app
      - ../apps:/apps
      - ../nodes:/nodes
    command:
      sh -c "npm install && node index.js"
    ports:
      - "3333:3333"
    networks:
      - ahola-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/apps"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  minio:
    image: quay.io/minio/minio
    container_name: ahola-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ahola
      MINIO_ROOT_PASSWORD: change-this-password
    volumes:
      - ../minio/data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ahola-net
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ahola-net:
    driver: bridge
