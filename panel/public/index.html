<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahola Node - Deployment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
        .animate-pulse-custom {
            animation: pulse 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans antialiased">

    <nav class="border-b border-slate-200 bg-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2 font-bold text-xl tracking-tight text-slate-900">
                    <div class="w-6 h-6 bg-slate-900 rounded flex items-center justify-center text-white text-xs font-black">A</div>
                    Ahola Node
                </div>
                <div class="hidden md:flex gap-6 text-sm font-medium text-slate-500">
                    <a href="#" class="text-slate-900 border-b-2 border-slate-900 px-1 py-5">Overview</a>
                    <a href="#" class="hover:text-slate-900 px-1 py-5 transition">Routes & DNS</a>
                    <a href="#" class="hover:text-slate-900 px-1 py-5 transition">Gateways</a>
                    <a href="#" class="hover:text-slate-900 px-1 py-5 transition">Settings</a>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button class="bg-slate-950 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">
                    Deploy Application
                </button>
                <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-slate-900">App Deployments</h1>
                <p class="text-sm text-slate-500 mt-1">Configure and manage active network routing for your hostnames.</p>
            </div>
            
            <div class="flex gap-4 bg-white border border-slate-200 p-2 rounded-xl text-xs font-medium">
                <div class="flex items-center gap-2 px-2 py-1">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    <span class="text-slate-600">Browser Connection</span>
                </div>
                <div class="flex items-center gap-2 px-2 py-1 border-l border-slate-100">
                    <span class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></span>
                    <span class="text-slate-500">Ahola Gateway</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white border border-slate-200 rounded-xl p-5 animate-pulse-custom">
                <div class="h-3.5 bg-slate-200 rounded w-1/3 mb-3"></div>
                <div class="h-7 bg-slate-200 rounded w-1/2"></div>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-5 animate-pulse-custom">
                <div class="h-3.5 bg-slate-200 rounded w-1/4 mb-3"></div>
                <div class="h-7 bg-slate-200 rounded w-2/3"></div>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-5 animate-pulse-custom">
                <div class="h-3.5 bg-slate-200 rounded w-1/2 mb-3"></div>
                <div class="h-7 bg-slate-200 rounded w-1/3"></div>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
            <div class="p-5 border-b border-slate-200 flex items-center justify-between">
                <div class="h-4 bg-slate-200 rounded w-32 animate-pulse-custom"></div>
                <div class="h-8 bg-slate-100 rounded w-48 animate-pulse-custom"></div>
            </div>
            
            <div class="divide-y divide-slate-100">
                <div class="p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 animate-pulse-custom">
                    <div class="flex items-center gap-4 w-full sm:w-1/3">
                        <div class="w-10 h-10 bg-slate-200 rounded-lg shrink-0"></div>
                        <div class="space-y-2 w-full">
                            <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                            <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                        </div>
                    </div>
                    <div class="space-y-2 w-full sm:w-1/4">
                        <div class="h-3 bg-slate-200 rounded w-2/3"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                    </div>
                    <div class="h-6 bg-slate-200 rounded-full w-20 self-start sm:self-center"></div>
                    <div class="h-4 bg-slate-200 rounded w-4 hidden sm:block"></div>
                </div>

                <div class="p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 animate-pulse-custom">
                    <div class="flex items-center gap-4 w-full sm:w-1/3">
                        <div class="w-10 h-10 bg-slate-200 rounded-lg shrink-0"></div>
                        <div class="space-y-2 w-full">
                            <div class="h-4 bg-slate-200 rounded w-2/3"></div>
                            <div class="h-3 bg-slate-200 rounded w-1/3"></div>
                        </div>
                    </div>
                    <div class="space-y-2 w-full sm:w-1/4">
                        <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/3"></div>
                    </div>
                    <div class="h-6 bg-slate-200 rounded-full w-16 self-start sm:self-center"></div>
                    <div class="h-4 bg-slate-200 rounded w-4 hidden sm:block"></div>
                </div>

                <div class="p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 animate-pulse-custom">
                    <div class="flex items-center gap-4 w-full sm:w-1/3">
                        <div class="w-10 h-10 bg-slate-200 rounded-lg shrink-0"></div>
                        <div class="space-y-2 w-full">
                            <div class="h-4 bg-slate-200 rounded w-4/5"></div>
                            <div class="h-3 bg-slate-200 rounded w-3/5"></div>
                        </div>
                    </div>
                    <div class="space-y-2 w-full sm:w-1/4">
                        <div class="h-3 bg-slate-200 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                    </div>
                    <div class="h-6 bg-slate-200 rounded-full w-24 self-start sm:self-center"></div>
                    <div class="h-4 bg-slate-200 rounded w-4 hidden sm:block"></div>
                </div>
            </div>
            
            <div class="bg-slate-50 px-5 py-4 border-t border-slate-200 text-xs text-slate-500 flex items-center gap-2">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>Missing a hostname route? Make sure your app is deployed and your DNS points directly to this Ahola node structure.</span>
            </div>
        </div>
    </main>

</body>
</html>
